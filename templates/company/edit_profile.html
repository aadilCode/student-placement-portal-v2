{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <div class="d-flex justify-content-between mb-3">
                <h5>Edit Company Profile</h5>
                <a href="{{ url_for('company.dashboard') }}" class="btn btn-outline-secondary btn-sm">← Back</a>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Company Name</label>
                    <input type="text" name="name" class="form-control" value="{{ current_user.name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">HR Contact Name</label>
                    <input type="text" name="hr_contact" class="form-control" value="{{ current_user.hr_contact or '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" value="{{ current_user.phone or '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Website</label>
                    <input type="text" name="website" class="form-control" value="{{ current_user.website or '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Company Overview</label>
                    <textarea name="overview" class="form-control" rows="4">{{ current_user.overview or '' }}</textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Save Changes</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
