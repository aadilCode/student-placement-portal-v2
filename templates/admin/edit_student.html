{% extends 'base.html' %}
{% block title %}Edit Student{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <div class="d-flex justify-content-between mb-3">
                <h5>Edit Student — {{ student.name }}</h5>
                <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary btn-sm">← Back</a>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <input type="text" name="department" class="form-control" value="{{ student.department or '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" value="{{ student.phone or '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">CGPA</label>
                    <input type="number" step="0.01" name="cgpa" class="form-control" value="{{ student.cgpa or '' }}">
                </div>
                <button type="submit" class="btn btn-primary w-100">Save Changes</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
